# policy/secrets.yaml
# Declares every runtime secret the KASS notebooks and CI read.
# Repository greps clean for hardcoded credentials (SPEC.md §11.4, §16.5).
# All secrets are injected via environment variables loaded by python-dotenv.

version: 1
repository: KASS
policy_stance: >
  Secrets are loaded from environment variables at notebook runtime via
  python-dotenv. No secret may be committed to the repository. See
  SECURITY.md (.github/SECURITY.md:50-54) and SPEC.md §10, §11.4.

evidence:
  spec: SPEC.md
  spec_sections:
    - "SPEC.md §10 (Authentication & Authorization)"
    - "SPEC.md §11.4 (Secrets Surface)"
    - "SPEC.md §6.2 (Environment Variables)"
  security_policy: ".github/SECURITY.md"

runtime_secrets:

  - name: FRED_API_KEY
    required: true
    description: >
      Federal Reserve Economic Data API key. All 6 notebooks read this via
      os.getenv("FRED_API_KEY") inside the krl_data_connectors wrappers.
    consumers:
      - "notebooks/applied-econometrics/07-labor-market-intelligence.ipynb"
      - "notebooks/applied-econometrics/20-opportunity-zone-evaluation.ipynb"
      - "notebooks/applied-econometrics/22-workforce-development-roi.ipynb"
      - "notebooks/causal-inference/11-heterogeneous-treatment-effects.ipynb"
      - "notebooks/causal-inference/14-synthetic-control-policy-lab.ipynb"
      - "notebooks/causal-inference/15-regression-discontinuity-toolkit.ipynb"
    signup_url: "https://fred.stlouisfed.org/docs/api/api_key.html"
    loaded_by: "python-dotenv"
    lookup_order:
      - "~/.krl/.env"
      - "./.env"
    evidence: "SPEC.md §4 (per-notebook), §6.2"
    rotation:
      owner: <TOKEN_TBD::fred-key-rotation-owner>
      cadence: <TOKEN_TBD::fred-key-rotation-cadence>

  - name: BLS_API_KEY
    required: true
    description: >
      Bureau of Labor Statistics API key. Read by NB07 only.
    consumers:
      - "notebooks/applied-econometrics/07-labor-market-intelligence.ipynb"
    signup_url: "https://data.bls.gov/registrationEngine/"
    loaded_by: "python-dotenv"
    lookup_order:
      - "~/.krl/.env"
      - "./.env"
    evidence: "SPEC.md §4.NB07, CHANGELOG.md:40"
    rotation:
      owner: <TOKEN_TBD::bls-key-rotation-owner>
      cadence: <TOKEN_TBD::bls-key-rotation-cadence>
    failure_mode: >
      Post-audit (CHANGELOG.md:40), missing BLS_API_KEY raises RuntimeError.
      There is no demo-data fallback any longer (SPEC.md §16.4).

  - name: KRL_DEV_PATH
    required: false
    secret: false    # path, not credential
    description: >
      Optional path to a local checkout of the private KRL workspace
      (Private IP/). When set, notebooks prepend local src/ paths to
      sys.path; when unset, they attempt pip-installed krl-* packages
      (which are not on public PyPI — see ADR-0001).
    consumers: "all 6 notebooks (bootstrap cell 0)"
    evidence: "SPEC.md §3.4, §6.2; notebooks/causal-inference/14-synthetic-control-policy-lab.ipynb first code cell"
    related_adr: "DECISIONS/0001-demo-only-no-proprietary-compute.md"

ci_secrets:
  # The pages.yml workflow uses only GitHub-provided tokens
  # (GITHUB_TOKEN, id-token for OIDC to the Pages deploy environment).
  # No KRL-owned secrets are injected into CI today.
  github_provided:
    - GITHUB_TOKEN
    - actions/configure-pages@v4 managed id-token
  krl_owned:
    []   # none; no test suite, no release signing, no package publishing

env_file_handling:
  filename: ".env"
  gitignore_entries: [".env", ".venv"]    # .gitignore:40-41
  example_file: ".env.example"
  example_exists: false                    # SPEC.md §11.4 — gap
  example_required: true
  calibration: <TOKEN_TBD::ship-dot-env-example>

rotation_policy:
  on_exposure:
    - "Rotate the exposed key at its provider console immediately."
    - "Verify .gitignore still covers the .env artifact."
    - "Audit the last 90 days of git history for regressions with `git log -p -S<PARTIAL_KEY>`."
    - "Notify security@krlabs.dev."
  baseline_cadence: <TOKEN_TBD::baseline-rotation-cadence>

prohibited:
  hardcoded_credentials:
    status: forbidden
    scanner: <TOKEN_TBD::secret-scanner-tool>   # e.g. gitleaks, trufflehog
    wired_in_ci: false                           # SPEC.md §11.3
  committed_env_files:
    status: forbidden
    enforced_by: ".gitignore:40-41"

related_adrs:
  - "DECISIONS/0001-demo-only-no-proprietary-compute.md"

calibration_required:
  - <TOKEN_TBD::fred-key-rotation-owner>
  - <TOKEN_TBD::fred-key-rotation-cadence>
  - <TOKEN_TBD::bls-key-rotation-owner>
  - <TOKEN_TBD::bls-key-rotation-cadence>
  - <TOKEN_TBD::ship-dot-env-example>
  - <TOKEN_TBD::baseline-rotation-cadence>
  - <TOKEN_TBD::secret-scanner-tool>
